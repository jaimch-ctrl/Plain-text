<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓市報告</title>

<style>
:root{
  --bg:#0a0f1c;
  --panel:rgba(16,22,36,.84);
  --line:rgba(255,255,255,.07);
  --text:#eef4ff;
  --muted:#9aa8c7;
  --blue:#67a8ff;
  --mint:#7cf0d4;
  --shadow:0 18px 40px rgba(0,0,0,.28);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  background:
    radial-gradient(circle at 18% 12%, rgba(103,168,255,.14), transparent 20%),
    radial-gradient(circle at 82% 10%, rgba(124,240,212,.08), transparent 18%),
    linear-gradient(180deg,#08101d 0%, #0d1525 100%);
  color:var(--text);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(8,12,23,.55), rgba(8,12,23,.7)),
    url("./IMG_1270.jpeg") center center / 420px auto no-repeat;
  opacity:.12;
  pointer-events:none;
  z-index:0;
}

body::after{
  content:"Jean × Mino Internal";
  position:fixed;
  right:22px;
  bottom:16px;
  color:rgba(255,255,255,.12);
  font-size:16px;
  font-weight:700;
  letter-spacing:.04em;
  pointer-events:none;
  z-index:0;
  white-space:nowrap;
}

.wrap{
  position:relative;
  z-index:1;
  max-width:760px;
  margin:auto;
  padding:22px 16px 38px;
}

.hero{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.logo{
  width:58px;
  height:58px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(255,255,255,.16);
  box-shadow:var(--shadow);
  background:#111827;
  flex:0 0 auto;
}

.hero-text h1{
  margin:0;
  font-size:28px;
  font-weight:900;
}

.hero-text p{
  margin:4px 0 0;
  font-size:13px;
  color:var(--muted);
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(8px);
}

.card-title{
  font-size:15px;
  font-weight:900;
  margin-bottom:14px;
  letter-spacing:.04em;
}

.main-input,
.date-input{
  width:100%;
  padding:14px 15px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:var(--text);
  font-size:17px;
  outline:none;
}

.main-input{
  margin-bottom:12px;
}

.date-input{
  margin-bottom:12px;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media (max-width:700px){
  .grid-2{
    grid-template-columns:1fr 1fr;
  }
}

.btn-main{
  width:100%;
  margin-top:12px;
  padding:15px 14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:900;
  color:#06111d;
  background:linear-gradient(90deg,var(--blue),var(--mint));
  box-shadow:0 10px 26px rgba(88,170,255,.22);
  cursor:pointer;
}

.btn-sub{
  padding:12px 12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.07);
  color:var(--text);
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}

.fav{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.fav button{
  padding:7px 12px;
  border:none;
  border-radius:999px;
  background:rgba(103,168,255,.12);
  color:var(--text);
  font-size:12px;
  font-weight:800;
  border:1px solid rgba(103,168,255,.14);
  cursor:pointer;
}

.empty{
  color:var(--muted);
  font-size:13px;
}

.helper{
  margin-top:10px;
  font-size:12px;
  line-height:1.8;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <img src="./IMG_1270.jpeg" class="logo" alt="Mino">
    <div class="hero-text">
      <h1>貓市報告</h1>
      <p>Mino Warrant Terminal｜快速查權證 / 股票頁面</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">主查詢</div>
    <input id="stock" class="main-input" placeholder="輸入股票代號，例如 2454">
    <input id="date" class="date-input" type="date">

    <div class="grid-2">
      <button class="btn-sub" onclick="setToday()">今天</button>
      <button class="btn-sub" onclick="setOffset(-1)">昨天</button>
      <button class="btn-sub" onclick="setOffset(-3)">前3天</button>
      <button class="btn-sub" onclick="setOffset(-5)">前5天</button>
    </div>

    <button class="btn-main" onclick="openHiStock()">開 HiStock 權證頁</button>

    <div class="helper">
      主用途：輸入股票代號後，直接進入 HiStock 權證頁。<br>
      歷史資料查找可再搭配 Yahoo 與 Google。
    </div>
  </div>

  <div class="card">
    <div class="card-title">快速工具</div>
    <div class="grid-2">
      <button class="btn-sub" onclick="openYahoo()">Yahoo 股票</button>
      <button class="btn-sub" onclick="openGoogle()">Google（含日期）</button>
      <button class="btn-sub" onclick="copyCode()">複製代號</button>
      <button class="btn-sub" onclick="saveFav()">收藏代號</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">常用代號</div>
    <div id="fav" class="fav"></div>
  </div>

</div>

<script>
const STOCK="stock";
const DATE="date";
const FAV="fav";

function getStock(){
  return document.getElementById("stock").value.trim();
}
function getDate(){
  return document.getElementById("date").value;
}

function setToday(){
  setOffset(0);
}
function setOffset(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  const v=d.toISOString().split("T")[0];
  document.getElementById("date").value=v;
  localStorage.setItem(DATE,v);
}

function saveState(){
  localStorage.setItem(STOCK,getStock());
  localStorage.setItem(DATE,getDate());
}

function openHiStock(){
  const s=getStock();
  if(!s)return alert("請輸入代號");
  window.open(`https://histock.tw/stock/warrant.aspx?no=${s}`);
  saveState();
}

function openYahoo(){
  const s=getStock();
  if(!s)return alert("請輸入代號");
  window.open(`https://tw.stock.yahoo.com/quote/${s}`);
  saveState();
}

function openGoogle(){
  const s=getStock();
  const d=getDate();
  if(!s)return alert("請輸入代號");
  const q=encodeURIComponent(`${s} 權證 成交量 ${d}`);
  window.open(`https://www.google.com/search?q=${q}`);
  saveState();
}

function copyCode(){
  const s=getStock();
  if(!s)return alert("請輸入代號");
  navigator.clipboard.writeText(s);
  alert("已複製：" + s);
}

function saveFav(){
  const s=getStock();
  if(!s)return;
  let list=JSON.parse(localStorage.getItem(FAV)||"[]");
  if(!list.includes(s)) list.unshift(s);
  localStorage.setItem(FAV,JSON.stringify(list.slice(0,10)));
  renderFav();
  saveState();
}

function renderFav(){
  let list=JSON.parse(localStorage.getItem(FAV)||"[]");
  const el=document.getElementById("fav");
  if(!list.length){
    el.innerHTML='<div class="empty">無收藏</div>';
    return;
  }
  el.innerHTML=list.map(x=>`<button onclick="useFav('${x}')">${x}</button>`).join("");
}

function useFav(s){
  document.getElementById("stock").value=s;
}

function load(){
  const s=localStorage.getItem(STOCK);
  const d=localStorage.getItem(DATE);
  if(s) document.getElementById("stock").value=s;
  if(d) document.getElementById("date").value=d;
  else setToday();
  renderFav();
}

load();
</script>

</body>
</html>
