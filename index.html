<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貓市報告｜Mino Warrant Terminal</title>
  <style>
    :root{
      --bg:#0a1020;
      --panel:rgba(17,25,43,.82);
      --panel-strong:rgba(20,30,52,.92);
      --panel-soft:rgba(30,43,71,.72);
      --line:rgba(132,166,255,.16);
      --line-strong:rgba(132,166,255,.24);
      --text:#edf4ff;
      --muted:#9fb0d2;
      --accent:#69b4ff;
      --accent2:#7bf0d0;
      --hot:#ffd15c;
      --danger:#ff7c7c;
      --shadow:0 18px 40px rgba(0,0,0,.32);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(88,170,255,.14), transparent 20%),
        radial-gradient(circle at 85% 12%, rgba(115,240,210,.08), transparent 18%),
        linear-gradient(180deg,#08101d 0%, #0d1525 100%);
      position:relative;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(8,12,23,.40), rgba(8,12,23,.55)),
        url("./IMG_1270.jpeg") 68% 52% / 340px auto no-repeat;
      opacity:.045;
      pointer-events:none;
      z-index:0;
    }

    body::after{
      content:"Jean × Mino Internal";
      position:fixed;
      right:22px;
      bottom:14px;
      color:rgba(255,255,255,.09);
      font-size:14px;
      font-weight:600;
      letter-spacing:.08em;
      pointer-events:none;
      z-index:1;
      white-space:nowrap;
    }

    .fx{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .fx span{
      position:absolute;
      display:block;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 70%);
      animation:floatUp linear infinite;
      opacity:.22;
      filter:blur(.3px);
    }

    .fx span:nth-child(1){width:180px;height:180px;left:8%;top:82%;animation-duration:18s}
    .fx span:nth-child(2){width:90px;height:90px;left:22%;top:68%;animation-duration:13s}
    .fx span:nth-child(3){width:140px;height:140px;left:48%;top:86%;animation-duration:21s}
    .fx span:nth-child(4){width:70px;height:70px;left:72%;top:80%;animation-duration:15s}
    .fx span:nth-child(5){width:120px;height:120px;left:86%;top:76%;animation-duration:17s}
    .fx span:nth-child(6){width:60px;height:60px;left:60%;top:65%;animation-duration:12s}

    @keyframes floatUp{
      0%{transform:translateY(0) scale(1);opacity:.10}
      30%{opacity:.20}
      100%{transform:translateY(-120px) scale(1.06);opacity:0}
    }

    .money{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .money i{
      position:absolute;
      opacity:.08;
      animation:drift 18s ease-in-out infinite alternate;
      font-style:normal;
      user-select:none;
    }

    .money i:nth-child(1){left:10%;top:22%;font-size:84px;transform:rotate(-18deg)}
    .money i:nth-child(2){left:74%;top:16%;font-size:62px;transform:rotate(15deg)}
    .money i:nth-child(3){left:80%;top:68%;font-size:88px;transform:rotate(-12deg)}
    .money i:nth-child(4){left:20%;top:74%;font-size:66px;transform:rotate(11deg)}
    .money i:nth-child(5){left:48%;top:14%;font-size:56px;transform:rotate(8deg)}
    .money i:nth-child(6){left:58%;top:76%;font-size:54px;transform:rotate(-10deg)}

    @keyframes drift{
      from{transform:translateY(0) rotate(-8deg)}
      to{transform:translateY(-18px) rotate(8deg)}
    }

    .wrap{
      position:relative;
      z-index:2;
      max-width:1280px;
      margin:0 auto;
      padding:22px 16px 34px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-logo{
      width:58px;
      height:58px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(255,255,255,.18);
      box-shadow:var(--shadow);
      background:#111827;
      flex-shrink:0;
    }

    .brand-fallback{
      width:58px;
      height:58px;
      border-radius:50%;
      display:none;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#07111f;
      font-weight:900;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }

    .brand-title{
      margin:0;
      font-size:24px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .brand-sub{
      margin:3px 0 0;
      font-size:13px;
      color:var(--muted);
    }

    .status-chip{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(84,238,193,.08);
      border:1px solid rgba(84,238,193,.24);
      color:var(--accent2);
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      flex-shrink:0;
    }

    .grid{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:16px;
      align-items:start;
    }

    @media (max-width: 920px){
      .grid{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:flex-start}
      body::before{background-size:300px auto}
      body::after{font-size:14px;right:14px;bottom:12px}
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 18px;
      border-bottom:1px solid var(--line);
    }

    .card-title{
      margin:0;
      font-size:14px;
      color:var(--text);
      font-weight:800;
      letter-spacing:.06em;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--accent2);
      box-shadow:0 0 16px rgba(123,240,208,.65);
    }

    .card-body{
      padding:18px;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .input{
      width:100%;
      border:none;
      outline:none;
      margin-bottom:14px;
      padding:15px 14px;
      border-radius:14px;
      background:rgba(74,114,198,.16);
      border:1px solid rgba(127,173,255,.15);
      color:var(--text);
      font-size:16px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .input::placeholder{
      color:rgba(237,244,255,.42);
    }

    .input:focus{
      border-color:rgba(106,181,255,.45);
      box-shadow:0 0 0 3px rgba(90,167,255,.12);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px 14px;
      font-size:17px;
      font-weight:900;
      color:#09111d;
      cursor:pointer;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      box-shadow:0 12px 26px rgba(80,164,255,.22);
      transition:.18s ease;
      margin-bottom:10px;
    }

    .btn:hover{filter:brightness(1.03)}
    .btn:active{transform:scale(.99)}
    .btn:disabled{opacity:.68;cursor:not-allowed}

    .subbtn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 12px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      margin-bottom:10px;
      color:var(--text);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .subbtn:active{transform:scale(.99)}

    .msg{
      margin-top:12px;
      min-height:22px;
      color:var(--muted);
      font-size:13px;
    }

    .msg.error{color:var(--danger)}

    .footer-note{
      margin-top:14px;
      font-size:12px;
      line-height:1.75;
      color:var(--muted);
    }

    .fav-box{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }

    .fav-title{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .fav-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .fav-chip{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      background:rgba(105,180,255,.14);
      color:var(--text);
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      border:1px solid rgba(105,180,255,.18);
    }

    .fav-empty{
      color:var(--muted);
      font-size:12px;
    }

    .loading,
    .empty{
      min-height:480px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--muted);
      padding:24px;
    }

    .loading .pulse{
      width:48px;
      height:48px;
      border-radius:50%;
      border:3px solid rgba(106,181,255,.18);
      border-top-color:var(--accent);
      animation:spin 1s linear infinite;
      margin-bottom:14px;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .result-watermark{
      position:relative;
      overflow:hidden;
    }

    .result-watermark::before{
      content:"";
      position:absolute;
      inset:0;
      background:url("./IMG_1270.jpeg") center center / 520px auto no-repeat;
      opacity:.06;
      pointer-events:none;
      z-index:0;
    }

    .result-watermark > *{
      position:relative;
      z-index:1;
    }

    .quote-box{
      position:relative;
      background:linear-gradient(180deg, rgba(37,57,94,.58), rgba(17,26,44,.82));
      border:1px solid var(--line-strong);
      border-radius:20px;
      padding:18px;
      overflow:hidden;
      margin-bottom:14px;
    }

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,209,92,.12);
      border:1px solid rgba(255,209,92,.26);
      color:var(--hot);
      font-size:12px;
      font-weight:800;
      margin-bottom:10px;
    }

    .quote-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .quote-stock{
      font-size:42px;
      font-weight:900;
      line-height:1;
      margin-bottom:8px;
    }

    .quote-name{
      font-size:18px;
      font-weight:800;
      margin-bottom:4px;
    }

    .quote-subname{
      font-size:13px;
      color:var(--muted);
    }

    .quote-volume{
      text-align:right;
      min-width:120px;
    }

    .quote-volume .k{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .quote-volume .v{
      font-size:42px;
      line-height:1;
      color:var(--hot);
      font-weight:900;
    }

    .metric-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    @media (max-width: 760px){
      .metric-grid{grid-template-columns:1fr 1fr}
      .quote-top{flex-direction:column}
      .quote-volume{text-align:left}
    }

    .metric{
      background:rgba(94,132,214,.10);
      border:1px solid rgba(132,166,255,.16);
      border-radius:14px;
      padding:12px;
    }

    .metric .k{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .metric .v{
      font-size:17px;
      font-weight:900;
      word-break:break-word;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:18px 0 10px;
      gap:10px;
      flex-wrap:wrap;
    }

    .section-title h3{
      margin:0;
      font-size:15px;
      color:var(--text);
      font-weight:800;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .copy-btn{
      border:none;
      border-radius:10px;
      padding:8px 12px;
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
    }

    .list{
      display:grid;
      gap:10px;
    }

    .row{
      background:linear-gradient(180deg, rgba(49,74,122,.44), rgba(23,34,58,.88));
      border:1px solid rgba(132,166,255,.16);
      border-radius:18px;
      padding:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }

    .row-left{min-width:0}

    .rank{
      color:var(--accent2);
      font-size:12px;
      font-weight:800;
      margin-bottom:5px;
    }

    .code{
      font-size:20px;
      font-weight:900;
      line-height:1.1;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .vol{
      text-align:right;
      white-space:nowrap;
    }

    .vol .k{
      color:var(--muted);
      font-size:11px;
      margin-bottom:6px;
    }

    .vol .v{
      font-size:20px;
      font-weight:900;
    }
  </style>
</head>
<body>
  <div class="fx">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="money">
    <i>💵</i>
    <i>🪙</i>
    <i>💴</i>
    <i>🪙</i>
    <i>💵</i>
    <i>🪙</i>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img
          src="./IMG_1270.jpeg"
          alt="Mino Logo"
          class="brand-logo"
          onerror="this.style.display='none';document.getElementById('fallbackBadge').style.display='flex';"
        >
        <div id="fallbackBadge" class="brand-fallback">貓</div>
        <div>
          <h1 class="brand-title">貓市報告</h1>
          <p class="brand-sub">Mino Warrant Terminal</p>
        </div>
      </div>

      <div class="status-chip">Render API 已連線</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-head">
          <h2 class="card-title">查詢面板</h2>
          <div class="dot"></div>
        </div>
        <div class="card-body">
          <label for="api">API 來源</label>
          <input id="api" class="input" value="https://plain-text.onrender.com">

          <label for="stock">股票代號</label>
          <input id="stock" class="input" placeholder="例如 2454" inputmode="numeric">

          <button id="runBtn" class="btn" onclick="run()">查詢</button>
          <button class="subbtn" onclick="saveFavorite()">收藏目前代號</button>

          <div id="msg" class="msg"></div>

          <div class="fav-box">
            <div class="fav-title">常用代號收藏</div>
            <div id="favList" class="fav-list">
              <div class="fav-empty">目前尚未收藏</div>
            </div>
          </div>

          <div class="footer-note">
            ① 目前畫面已接上你的 Render API。<br>
            ② 若免費方案休眠，第一次查詢可能會稍慢。<br>
            ③ 畫面含 Mino 品牌浮水印與視覺識別。<br>
            ④ 本頁已限制一般複製行為，但無法百分之百防止轉傳。
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2 class="card-title">查詢結果</h2>
          <div class="dot"></div>
        </div>
        <div class="card-body result-watermark" id="resultWrap">
          <div class="empty">
            <div style="font-size:44px;margin-bottom:12px;">📈</div>
            <div style="font-size:18px;font-weight:900;margin-bottom:8px;color:var(--text);">等待查詢</div>
            <div>輸入股票代號後，按下「查詢」即可顯示最熱門權證與前 3 檔。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STOCK_KEY = "mino_last_stock";
    const FAV_KEY = "mino_favorites";

    function loadLastStock(){
      const lastStock = localStorage.getItem(STOCK_KEY);
      if(lastStock){
        document.getElementById("stock").value = lastStock;
      }
    }

    function getFavorites(){
      try{
        return JSON.parse(localStorage.getItem(FAV_KEY) || "[]");
      }catch(e){
        return [];
      }
    }

    function setFavorites(list){
      localStorage.setItem(FAV_KEY, JSON.stringify(list));
    }

    function renderFavorites(){
      const favList = document.getElementById("favList");
      const list = getFavorites();

      if(!list.length){
        favList.innerHTML = '<div class="fav-empty">目前尚未收藏</div>';
        return;
      }

      favList.innerHTML = list.map(function(code){
        return '<button class="fav-chip" onclick="useFavorite(\'' + code + '\')">' + code + '</button>';
      }).join("");
    }

    function useFavorite(code){
      document.getElementById("stock").value = code;
      localStorage.setItem(STOCK_KEY, code);
    }

    function saveFavorite(){
      const stock = document.getElementById("stock").value.trim();
      if(!stock){
        alert("請先輸入股票代號。");
        return;
      }

      let list = getFavorites();
      if(!list.includes(stock)){
        list.unshift(stock);
      }
      list = list.slice(0, 12);
      setFavorites(list);
      renderFavorites();
      document.getElementById("msg").innerText = "已收藏代號：" + stock;
    }

    async function copyTopCode(code){
      try{
        await navigator.clipboard.writeText(code);
        document.getElementById("msg").innerText = "已複製熱門權證代碼：" + code;
      }catch(e){
        document.getElementById("msg").innerText = "複製失敗，請手動複製。";
      }
    }

    async function run(){
      const api = document.getElementById('api').value.trim();
      const stock = document.getElementById('stock').value.trim();
      const resultWrap = document.getElementById('resultWrap');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('runBtn');

      if(!stock){
        msg.className = "msg error";
        msg.innerText = "請先輸入股票代號。";
        return;
      }

      localStorage.setItem(STOCK_KEY, stock);

      msg.className = "msg";
      msg.innerText = "查詢中…";
      btn.disabled = true;
      btn.innerText = "查詢中...";

      resultWrap.innerHTML = `
        <div class="loading">
          <div class="pulse"></div>
          <div style="font-size:18px;font-weight:900;color:var(--text);margin-bottom:8px;">查詢中</div>
          <div>若 Render 正在喚醒，第一次可能會慢一點。</div>
        </div>
      `;

      try{
        const res = await fetch(api + "/api/warrant/top?stock=" + stock);
        const data = await res.json();

        if(!res.ok || !data.top){
          throw new Error("查詢失敗");
        }

        const now = new Date().toLocaleString("zh-TW");
        const stockName = data.top.name || "未提供名稱";
        const topCode = data.top.code || "";

        const top3Html = (data.top3 || []).map(function(x, idx){
          return `
            <div class="row">
              <div class="row-left">
                <div class="rank">TOP ${idx + 1}</div>
                <div class="code">${x.code}</div>
                <div class="sub">權證代碼</div>
              </div>
              <div class="vol">
                <div class="k">成交量</div>
                <div class="v">${Number(x.volume || 0).toLocaleString()}</div>
              </div>
            </div>
          `;
        }).join("");

        resultWrap.innerHTML = `
          <div class="quote-box">
            <div class="tag">最高成交量</div>
            <div class="quote-top">
              <div>
                <div class="quote-stock">${data.stock}</div>
                <div class="quote-name">${topCode}</div>
                <div class="quote-subname">${stockName}</div>
              </div>
              <div class="quote-volume">
                <div class="k">成交量</div>
                <div class="v">${Number(data.top.volume || 0).toLocaleString()}</div>
              </div>
            </div>

            <div class="metric-grid">
              <div class="metric">
                <div class="k">股票代號</div>
                <div class="v">${data.stock}</div>
              </div>
              <div class="metric">
                <div class="k">股票名稱</div>
                <div class="v">${stockName}</div>
              </div>
              <div class="metric">
                <div class="k">最熱門代碼</div>
                <div class="v">${topCode}</div>
              </div>
              <div class="metric">
                <div class="k">查詢時間</div>
                <div class="v">${now}</div>
              </div>
            </div>
          </div>

          <div class="section-title">
            <h3>Top 3 權證</h3>
            <button class="copy-btn" onclick="copyTopCode('${topCode}')">一鍵複製熱門權證代碼</button>
          </div>

          <div class="list">
            ${top3Html}
          </div>
        `;

        msg.className = "msg";
        msg.innerText = "查詢完成。";
      }catch(e){
        msg.className = "msg error";
        msg.innerText = "查詢失敗，請稍後再試。";
        resultWrap.innerHTML = `
          <div class="empty">
            <div style="font-size:42px;margin-bottom:10px;">⚠️</div>
            <div style="font-weight:900;font-size:18px;margin-bottom:6px;color:var(--text);">查詢失敗</div>
            <div>可能是 Render 尚未喚醒，或 API 暫時沒有回應。</div>
          </div>
        `;
      }finally{
        btn.disabled = false;
        btn.innerText = "查詢";
      }
    }

    document.addEventListener("DOMContentLoaded", function(){
      loadLastStock();
      renderFavorites();
    });

    document.addEventListener("copy", function(e){
      e.preventDefault();
      document.getElementById("msg").innerText = "此頁已限制直接複製。";
    });

    document.addEventListener("contextmenu", function(e){
      e.preventDefault();
    });

    document.addEventListener("selectstart", function(e){
      e.preventDefault();
    });

    document.addEventListener("dragstart", function(e){
      e.preventDefault();
    });
  </script>
</body>
</html>
