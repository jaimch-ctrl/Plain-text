<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓市報告｜快查版</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  background:#0b1220;
  color:#fff;
}
.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}
input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  font-size:18px;
}
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:800;
  background:#4da3ff;
  color:#000;
  cursor:pointer;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.small{
  font-size:12px;
  color:#aaa;
  margin-top:10px;
}
.fav{
  margin-top:10px;
}
.fav button{
  width:auto;
  padding:6px 10px;
  margin:4px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">

<h2>貓市報告</h2>

<input id="stock" placeholder="輸入股票代號 例如 2454">
<input id="date" type="date">

<div class="row">
<button onclick="setToday()">今天</button>
<button onclick="setOffset(-1)">昨天</button>
<button onclick="setOffset(-3)">前3天</button>
<button onclick="setOffset(-5)">前5天</button>
</div>

<button onclick="openYahoo()">開 Yahoo 股票頁</button>
<button onclick="openHiStock()">開 HiStock 權證頁</button>
<button onclick="openGoogle()">Google 搜尋（含日期）</button>
<button onclick="copyCode()">複製代號</button>

<button onclick="saveFav()">收藏代號</button>

<div id="fav" class="fav"></div>

<div class="small">
✔ 這版不抓資料，完全穩定<br>
✔ 查歷史用 Google（帶日期）<br>
✔ 看權證直接用 HiStock
</div>

</div>

<script>

const STOCK_KEY="stock"
const DATE_KEY="date"
const FAV_KEY="fav"

function getStock(){
  return document.getElementById("stock").value.trim()
}
function getDate(){
  return document.getElementById("date").value
}

function setToday(){
  const d=new Date()
  setDate(d)
}
function setOffset(n){
  const d=new Date()
  d.setDate(d.getDate()+n)
  setDate(d)
}
function setDate(d){
  const v=d.toISOString().split("T")[0]
  document.getElementById("date").value=v
  localStorage.setItem(DATE_KEY,v)
}

function openYahoo(){
  const s=getStock()
  if(!s)return alert("請輸入代號")
  window.open(`https://tw.stock.yahoo.com/quote/${s}`)
  localStorage.setItem(STOCK_KEY,s)
}

function openHiStock(){
  const s=getStock()
  if(!s)return alert("請輸入代號")
  window.open(`https://histock.tw/stock/warrant.aspx?no=${s}`)
  localStorage.setItem(STOCK_KEY,s)
}

function openGoogle(){
  const s=getStock()
  const d=getDate()
  if(!s)return alert("請輸入代號")

  const q=encodeURIComponent(`${s} 權證 成交量 排行 ${d}`)
  window.open(`https://www.google.com/search?q=${q}`)
  localStorage.setItem(STOCK_KEY,s)
  if(d)localStorage.setItem(DATE_KEY,d)
}

function copyCode(){
  const s=getStock()
  if(!s)return
  navigator.clipboard.writeText(s)
  alert("已複製："+s)
}

function saveFav(){
  const s=getStock()
  if(!s)return
  let list=JSON.parse(localStorage.getItem(FAV_KEY)||"[]")
  if(!list.includes(s)) list.unshift(s)
  localStorage.setItem(FAV_KEY,JSON.stringify(list.slice(0,10)))
  renderFav()
}

function renderFav(){
  const el=document.getElementById("fav")
  let list=JSON.parse(localStorage.getItem(FAV_KEY)||"[]")
  if(!list.length){
    el.innerHTML="無收藏"
    return
  }
  el.innerHTML=list.map(x=>`<button onclick="useFav('${x}')">${x}</button>`).join("")
}

function useFav(s){
  document.getElementById("stock").value=s
}

function load(){
  const s=localStorage.getItem(STOCK_KEY)
  const d=localStorage.getItem(DATE_KEY)
  if(s)document.getElementById("stock").value=s
  if(d)document.getElementById("date").value=d
  else setToday()
  renderFav()
}

load()

</script>

</body>
</html>
